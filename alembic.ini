; ---------------------------------------------------------------------------
; Alembic configuration for Peach.
;
; Most application config lives in pyproject.toml or .env; Alembic insists
; on its own ini file so this is the minimum that keeps autogenerate working.
;
; Run migrations with:
;     uv run alembic upgrade head
;     make migrate            (shortcut)
;
; Create a new migration:
;     uv run alembic revision --autogenerate -m "describe the change"
;     make migrate-create msg="describe the change"
; ---------------------------------------------------------------------------

[alembic]
; Path to the migration scripts.  Relative to the directory `alembic` is run
; from, which is always the project root in our setup.
script_location = alembic

; File naming template — prefixing with %(year)d_%(month).2d_%(day).2d makes
; migrations sort chronologically in `ls`, which is what humans expect when
; reviewing migration history.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

; Use OS-native path separators — irrelevant on Linux, future-proofs for
; Windows contributors.
sourceless = false

; `sqlalchemy.url` is intentionally LEFT BLANK here.  alembic/env.py reads
; the real URL from peach.config.settings so we have a single source of
; truth (pydantic-settings).  If you put a URL here, env.py ignores it.
sqlalchemy.url =

; ---------------------------------------------------------------------------
; Logging — kept minimal.  The application uses structlog; Alembic only
; runs during deploys / dev so plain stderr logging is fine.
; ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
